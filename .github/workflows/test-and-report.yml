name: SpendSense E2E Testing & Reports CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  selenium-web-api-tests:
    name: Selenium E2E Web + API Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Backend Dependencies
        run: |
          cd server
          npm install

      - name: Install Selenium Suite Dependencies
        run: |
          cd selenium-tests
          npm install

      - name: Execute E2E Web & API Suite
        run: |
          cd selenium-tests
          node selenium-test.js

      - name: Upload Selenium Excel Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-test-report
          path: selenium-tests/selenium_report.xlsx

  appium-mobile-dry-run:
    name: Appium Mobile Tests Dry-Run
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Appium Suite Dependencies
        run: |
          cd appium-tests
          npm install

      - name: Execute Appium Verification Dry-Run
        run: |
          cd appium-tests
          npm run dry-run
